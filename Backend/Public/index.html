<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <title>İstanbul Kart Harita</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.js" data-callback="initMapKit" async></script>
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <div class="brand-icon">IK</div>
        <div>
          <h1>İstanbul Kart</h1>
          <p>Biletmatik ve dolum noktaları</p>
        </div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar glass">
        <div class="search-block">
          <label for="search">Ara</label>
          <input id="search" type="search" placeholder="İlçe, terminal no..." autocomplete="off" />
        </div>

        <div class="search-block">
          <label for="district">İlçe</label>
          <select id="district">
            <option value="">Tüm ilçeler</option>
          </select>
        </div>

        <div class="search-block">
          <label>Nokta tipi</label>
          <div id="type-filters" class="chip-row"></div>
        </div>

        <div class="button-row">
          <button id="btn-filter" class="btn btn-primary" type="button">Filtrele</button>
          <button id="btn-nearby" class="btn btn-secondary" type="button">Yakınımdakiler</button>
        </div>

        <div id="stats" class="stats">Yükleniyor...</div>

        <div id="location-list" class="location-list"></div>

        <footer class="footer-note">
          Veri: İBB Açık Veri — BELBİM İstanbulkart Dolum Merkezi Bilgileri
        </footer>
      </aside>

      <main class="map-panel">
        <div id="map"></div>
        <div id="map-fallback" class="map-fallback hidden">
          <p>Harita yüklenemedi. MapKit JS token yapılandırması için README dosyasına bakın.</p>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
