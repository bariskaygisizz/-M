<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="İstanbul Ulaşım" />
  <meta name="theme-color" content="#e30a17" />
  <meta name="description" content="İstanbul toplu taşıma haritası: otobüs, metro, Marmaray, tramvay, vapur durakları ve İstanbulkart dolum noktaları" />
  <title>İstanbul Ulaşım Haritası</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <!-- Üst arama çubuğu -->
  <div class="top-search">
    <input id="search" type="search" placeholder="Durak, istasyon, hat ara..." autocomplete="off" enterkeyhint="search" />
    <button id="btn-clear" class="clear-btn hidden" type="button" aria-label="Temizle">✕</button>
  </div>

  <!-- Ulaşım türü çipleri (yatay kaydırma) -->
  <div class="mode-bar">
    <div id="mode-filters" class="mode-scroll"></div>
  </div>

  <!-- Sağ alt: konum butonu -->
  <button id="btn-locate" class="fab" type="button" aria-label="Konumum">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      <circle cx="12" cy="12" r="8"/>
    </svg>
  </button>

  <!-- Yakınlaştırma ipucu -->
  <div id="zoom-hint" class="zoom-hint hidden">Durakları görmek için yakınlaştırın</div>

  <!-- Alt panel (bottom sheet) -->
  <div id="sheet" class="sheet collapsed">
    <button id="sheet-handle" class="sheet-handle" type="button" aria-label="Listeyi aç/kapat">
      <span class="grip"></span>
      <span id="stats" class="sheet-title">Yükleniyor...</span>
    </button>
    <div id="location-list" class="sheet-list"></div>
    <div class="sheet-footer">Veri: İBB Açık Veri • Harita: © OpenStreetMap</div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>
